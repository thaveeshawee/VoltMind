<!DOCTYPE html>
<html>
<head>
<title>VoltMind AI Tutor</title>

<style>
body{
background:#050816;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:0;
}

.header{
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.container{
max-width:900px;
margin:50px auto;
padding:20px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:15px;
padding:20px;
font-size:18px;
}

button{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
}

.answer{
margin-top:30px;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
line-height:1.8;
font-size:18px;
}
</style>
</head>

<body>

<div class="header">
VoltMind AI Tutor
</div>

<div class="container">

<textarea id="question"
placeholder="Ask anything..."></textarea>

<button onclick="answerQuestion()">
Explain
</button>

<div id="answer" class="answer">
Your answer will appear here...
</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
